name: Vkd3d Proton Arm64ec Test

on:

  workflow_dispatch:
    inputs:
      FORCE_MODE:
        type: boolean
        description: "Force rebuild even if release exists"
        default: false
      VERSION:
        description: "vkd3d-proton version tag (auto-detect if empty)"
        required: false
        default: ""
      LLVM_TAG:
        description: "LLVM MinGW toolchain release tag (auto-detect if empty)"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

defaults:
  run:
    shell: bash --noprofile --norc -Eeuo pipefail {0}

env:
  TOOLCHAIN_DIR: /opt/llvm-mingw

jobs:
  guard:
    name: Check Version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      ver: ${{ steps.check.outputs.ver }}
      tag: ${{ steps.check.outputs.tag }}
      release_tag: ${{ steps.check.outputs.release_tag }}
      build_date: ${{ steps.check.outputs.build_date }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Install minimal tools
        run: |
          sudo apt-get -yq update
          sudo apt-get -yq install --no-install-recommends jq curl ca-certificates

      - name: Detect version + check release
        id: check
        run: |
          BUILD_DATE=$(date +%Y%m%d)
          if [[ -n "${{ inputs.VERSION }}" ]]; then
            VER="${{ inputs.VERSION }}"
            [[ "$VER" =~ ^v ]] || VER="v$VER"
          else
            VER=$(curl -sSL https://api.github.com/repos/HansKristian-Work/vkd3d-proton/releases/latest \
              | jq -r '.tag_name // empty')
            [[ -z "$VER" ]] && VER=$(curl -sSL \
              https://api.github.com/repos/HansKristian-Work/vkd3d-proton/releases \
              | jq -r '.[0].tag_name')
          fi
          VER_CLEAN="${VER#v}"
          RELEASE_TAG="vkd3d-proton-arm64ec-heavy-${VER_CLEAN}-${BUILD_DATE}"
          SKIP="false"
          if [[ "${{ inputs.FORCE_MODE }}" != "true" ]]; then
            HTTP=$(curl -s -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${RELEASE_TAG}")
            [[ "$HTTP" == "200" ]] && SKIP="true"
          fi
          echo "skip=$SKIP"               >> $GITHUB_OUTPUT
          echo "ver=$VER_CLEAN"           >> $GITHUB_OUTPUT
          echo "tag=$VER"                 >> $GITHUB_OUTPUT
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE"   >> $GITHUB_OUTPUT

  build:
    name: Build ARM64EC + x86
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.skip == 'false'
    timeout-minutes: 120
    env:
      VER: ${{ needs.guard.outputs.ver }}
      TAG: ${{ needs.guard.outputs.tag }}
      BUILD_DATE: ${{ needs.guard.outputs.build_date }}
      RELEASE_TAG: ${{ needs.guard.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git ninja-build curl jq python3 python3-venv python3-pip \
            glslang-tools spirv-tools zstd wget unzip patchelf gh

      - name: Pin Meson via venv
        run: |
          set -e
          VENV="${GITHUB_WORKSPACE}/.venv"
          python3 -m venv "$VENV"
          "$VENV/bin/pip" install --upgrade pip
          "$VENV/bin/pip" install "meson>=1.3.0"
          echo "PATH=$VENV/bin:${PATH}" >> "$GITHUB_ENV"
          "$VENV/bin/meson" --version
      
      - name: Detect LLVM MinGW
        id: llvm
        run: |
          if [[ -n "${{ inputs.LLVM_TAG }}" ]]; then
            LLVM_TAG="${{ inputs.LLVM_TAG }}"
          else
            LLVM_TAG=$(curl -sSL \
              https://api.github.com/repos/mstorsjo/llvm-mingw/releases/latest \
              | jq -r '.tag_name // empty')
            [[ -z "$LLVM_TAG" ]] && LLVM_TAG="20260407"
          fi
          echo "tag=$LLVM_TAG" >> $GITHUB_OUTPUT

      - name: Cache LLVM MinGW
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: ${{ env.TOOLCHAIN_DIR }}
          key: llvm-mingw-${{ steps.llvm.outputs.tag }}-arm64ec

      - name: Download LLVM MinGW
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        env:
          LTAG: ${{ steps.llvm.outputs.tag }}
        run: |
          pick_url() {
            local json="$1"
            for dist in 24.04 22.04 20.04; do
              local url
              url=$(echo "$json" | jq -r --arg d "$dist" \
                '.assets[]? | select(.name | endswith("ucrt-ubuntu-"+$d+"-x86_64.tar.xz")) | .browser_download_url' \
                | head -n1 || true)
              [[ -n "$url" && "$url" != "null" ]] && { echo "$url"; return 0; }
            done
            return 1
          }
          JSON=$(curl -sSL https://api.github.com/repos/mstorsjo/llvm-mingw/releases/tags/$LTAG || true)
          URL=$(pick_url "$JSON" || true)
          if [[ -z "${URL:-}" ]]; then
            JSON=$(curl -sSL https://api.github.com/repos/mstorsjo/llvm-mingw/releases/latest)
            URL=$(pick_url "$JSON")
          fi
          sudo mkdir -p $TOOLCHAIN_DIR
          wget -q "$URL" -O llvm.tar.xz
          sudo tar -C $TOOLCHAIN_DIR --strip-components=1 -xJf llvm.tar.xz
          rm llvm.tar.xz

      - name: Add Toolchain to PATH
        run: echo "$TOOLCHAIN_DIR/bin" >> $GITHUB_PATH

      - name: Verify Toolchain
        run: |
          arm64ec-w64-mingw32-clang --version
          i686-w64-mingw32-clang --version

      - name: Cache GLSLang
        id: cache-glslang
        uses: actions/cache@v4
        with:
          path: glslang
          key: glslang-main-tot-v2

      - name: Setup latest GLSLang
        if: steps.cache-glslang.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/KhronosGroup/glslang/releases/download/main-tot/glslang-main-linux-Release.zip
          unzip -q glslang-main-linux-Release.zip -d glslang
          rm glslang-main-linux-Release.zip

      - name: Add GLSLang to PATH
        run: |
          echo "$PWD/glslang/bin" >> $GITHUB_PATH
          echo "GLSLang version:"
          $PWD/glslang/bin/glslangValidator --version 2>/dev/null || $PWD/glslang/bin/glslang --version 2>/dev/null || true

      - name: Clone Source
        run: |
          git clone --recurse-submodules --recursive --branch master --depth 1 \
            https://github.com/BlueInstruction/vkd3d-proton.git src
          cd src
          echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "Source: master @ $(git rev-parse --short HEAD) (version label: v$VER)"

      - name: Update Vulkan + SPIRV Headers
        run: |
          VK_TAG=$(curl -sSL \
            https://api.github.com/repos/KhronosGroup/Vulkan-Headers/releases/latest \
            | jq -r '.tag_name // empty')
          [[ -z "$VK_TAG" ]] && VK_TAG="main"
          echo "VK_HEADERS_TAG=$VK_TAG" >> $GITHUB_ENV
          git clone --depth 1 --branch "$VK_TAG" \
            https://github.com/KhronosGroup/Vulkan-Headers.git vk-headers 2>/dev/null || \
          git clone --depth 1 https://github.com/KhronosGroup/Vulkan-Headers.git vk-headers
          [[ -d vk-headers/include/vulkan ]] && cp -r vk-headers/include/vulkan src/include/
          [[ -d vk-headers/registry ]] && { mkdir -p src/registry; cp -f vk-headers/registry/vk.xml src/registry/ 2>/dev/null || true; }
          rm -rf vk-headers

          SPIRV_TAG=$(curl -sSL \
            https://api.github.com/repos/KhronosGroup/SPIRV-Headers/releases/latest \
            | jq -r '.tag_name // empty')
          if [[ -n "$SPIRV_TAG" ]]; then
            echo "SPIRV_HEADERS_TAG=$SPIRV_TAG" >> $GITHUB_ENV
            git clone --depth 1 --branch "$SPIRV_TAG" \
              https://github.com/KhronosGroup/SPIRV-Headers.git spirv-h 2>/dev/null || true
            [[ -d spirv-h/include/spirv ]] && cp -r spirv-h/include/spirv src/include/ 2>/dev/null || true
            rm -rf spirv-h
          fi

      - name: Inspect VKD3D Source (debug patch targets)
        run: |
          cd src
          echo "=== GPU identity patterns in device.c ==="
          grep -n "vendor_id\|device_id\|DedicatedVideo\|SharedSystem\|adapter_id" libs/vkd3d/device.c 2>/dev/null | head -30 || true
          echo ""
          echo "=== Timeline/fence/esync patterns ==="
          grep -rn "timeline_semaphore\|win32_fence\|esync\|FENCE_SPIN\|shared_timeline" libs/vkd3d/*.c libs/vkd3d/*.h 2>/dev/null | head -30 || true
          echo ""
          echo "=== Render pass patterns ==="
          grep -rn "use_render_pass\|render_pass_only\|render_passes_only" libs/vkd3d/*.c libs/vkd3d/*.h 2>/dev/null | head -20 || true
          echo ""
          echo "=== UMA/host_cached patterns ==="
          grep -rn "force_host_cached\|host_cached\|UMA" libs/vkd3d/*.c libs/vkd3d/*.h 2>/dev/null | head -20 || true
          echo ""
          echo "=== Async compute / GPU boost patterns ==="
          grep -rn "async_compute\|concurrent_queue\|gpu_va_recycle\|lazy_create_pipeline\|max_compute_queues" libs/vkd3d/*.c libs/vkd3d/*.h 2>/dev/null | head -20 || true
          echo ""
          echo "=== Swapchain latency patterns ==="
          grep -rn "SWAPCHAIN_LATENCY\|MaximumFrameLatency\|frame_latency\|QUEUE_DEPTH" libs/vkd3d/*.c libs/vkd3d/*.h 2>/dev/null | head -20 || true
          echo ""
          echo "=== Descriptor limits patterns ==="
          grep -rn "maxDescriptorSet\|maxPerStageDescriptor" libs/vkd3d/*.c libs/vkd3d/*.h 2>/dev/null | head -20 || true
          echo ""
          echo "=== Submission/batch patterns ==="
          grep -rn "batch_submission\|submission_thread" libs/vkd3d/*.c libs/vkd3d/*.h 2>/dev/null | head -20 || true
          echo ""
          echo "=== Worker/shader thread patterns ==="
          grep -rn "worker_thread_count\|shader_worker\|SHADER_WORKER" libs/vkd3d/*.c libs/vkd3d/*.h 2>/dev/null | head -20 || true
          echo ""
          echo "=== Pipeline cache patterns ==="
          grep -rn "PIPELINE_CACHE_SIZE\|use_pipeline_cache" libs/vkd3d/*.c libs/vkd3d/*.h 2>/dev/null | head -20 || true
          echo ""
          echo "=== Fence recycle patterns ==="
          grep -rn "recycle_fences\|recycle_command" libs/vkd3d/*.c libs/vkd3d/*.h 2>/dev/null | head -20 || true
          echo ""
          echo "=== All .c and .h files in libs/vkd3d ==="
          ls libs/vkd3d/*.c libs/vkd3d/*.h 2>/dev/null | sort
          echo ""
          echo "=== Patch anchor: feature_level functions in device.c ==="
          grep -n "feature_level\|determine_feature_level\|D3D_FEATURE_LEVEL_12_0" libs/vkd3d/device.c 2>/dev/null | head -30 || true
          echo ""
          echo "=== Patch anchor: sparseBinding + KHR_buffer_device_address ==="
          grep -n "sparseBinding\|KHR_buffer_device_address" libs/vkd3d/device.c 2>/dev/null | head -20 || true
          echo ""
          echo "=== Patch anchor: PSO creation functions in state.c ==="
          grep -n "create_graphics_pipeline\|CreateGraphicsPipelineState\|pipeline_state_create" libs/vkd3d/state.c 2>/dev/null | head -20 || true
          echo ""
          echo "=== Patch anchor: VRS tier patterns ==="
          grep -n "VARIABLE_SHADING_RATE_TIER\|SHADING_RATE_TIER" libs/vkd3d/device.c 2>/dev/null | head -10 || true

      # ── ADRENO PATCHES ───────────────────────────────────────────────
      # Patches for Adreno 7xx (Qualcomm 0x5143) on Turnip driver.
      # VRS Tier 2 + FL 12.1 + TBR + Blend Fix + Transfer Queue + Heavy Fixes
      # PSO Fallback removed (confirmed crash cause in Ghost of Tsushima).
      # ────────────────────────────────────────────────────────────────────

      - name: Apply VRS Tier 2 Patch
        run: |
          cd src
          python3 - << 'PYEOF'
          import re, os
          # Commit 8850039: Bump RDNA1 compat path for VRS up to tier 2.
          # Crimson Desert hard requires VRS tier 2 in latest patch.
          path = "libs/vkd3d/device.c"
          with open(path, "r", encoding="utf-8") as f:
              c = f.read()
          old = "return D3D12_VARIABLE_SHADING_RATE_TIER_1;"
          new = "return D3D12_VARIABLE_SHADING_RATE_TIER_2;"
          if old in c:
              c = c.replace(old, new, 1)
              with open(path, "w", encoding="utf-8") as f:
                  f.write(c)
              print("VRS Tier 2 patch: applied (TIER_1 → TIER_2)")
          else:
              print("VRS Tier 2 patch: already applied or pattern not found")
          PYEOF

      - name: Apply Adreno FL 12.1 Override
        run: |
          cd src
          python3 - << 'PYEOF'
          import re, os

          path = "libs/vkd3d/device.c"
          with open(path, "r", encoding="utf-8") as f:
              c = f.read()
          if "Adreno FL 12.1 override" in c:
              print("Adreno FL 12.1 patch: already applied"); exit(0)

          # Auto-detect the variable name
          fl_assign = re.search(r'(\w+(?:->\w+)*(?:\.\w+)*)\s*=\s*D3D_FEATURE_LEVEL_12_1\s*;', c)
          if fl_assign:
              fl_var = fl_assign.group(1)
              print(f"Detected FL 12.1 variable: {fl_var}")
          else:
              fl_var = "caps->max_feature_level"
              print(f"WARN: Could not detect FL 12.1 variable, assuming: {fl_var}")

          # Find the FL 12.1 assignment and add Adreno override after it
          fl_line = re.search(
              r'(' + re.escape(fl_var) + r'\s*=\s*D3D_FEATURE_LEVEL_12_1\s*;)',
              c)
          if fl_line:
              idx = fl_line.end()
              adreno_insert = (
                  '\n\n    /* Adreno FL 12.1 override — BlueInstruction patch */\n'
                  '    /* Adreno 7xx supports ROVs via fragment_shader_interlock */\n'
                  '    if (' + fl_var + ' < D3D_FEATURE_LEVEL_12_1 &&\n'
                  '        device->device_info.properties2.properties.vendorID == 0x5143u &&\n'
                  '        device->device_info.features2.features.shaderInt64 &&\n'
                  '        caps->options.ROVsSupported)\n'
                  '    {\n'
                  '        ' + fl_var + ' = D3D_FEATURE_LEVEL_12_1;\n'
                  '        WARN("Adreno: elevating to FL 12.1 (ROVs confirmed).\\n");\n'
                  '    }'
              )
              c = c[:idx] + adreno_insert + c[idx:]
              with open(path, "w", encoding="utf-8") as f:
                  f.write(c)
              print("Adreno FL 12.1 patch: applied (after FL 12.1 assignment)")
          else:
              print("ERROR: Adreno FL 12.1 patch failed — no D3D_FEATURE_LEVEL_12_1 assignment found")
              exit(1)
          PYEOF

      - name: Apply Adreno PSO Fallback
        if: false
        run: |
          cd src
          python3 - << 'PYEOF'
          import re, os

          # PSO fallback goes in device.c where d3d12_pipeline_state_create is CALLED
          # (device.c:4796), not where it's DEFINED (state.c:5821)
          path = "libs/vkd3d/device.c"
          with open(path, "r", encoding="utf-8") as f:
              c = f.read()
          if "adreno_fallback" in c:
              print("Adreno PSO fallback: already applied"); exit(0)

          # Find: if (FAILED(hr = d3d12_pipeline_state_create(...)))
          #   or: hr = d3d12_pipeline_state_create(...)
          pattern = re.search(
              r'((?:if\s*\(\s*)?FAILED\s*\(\s*hr\s*=\s*d3d12_pipeline_state_create\s*\([^)]*\)[^)]*\))',
              c, re.DOTALL)
          if not pattern:
              pattern = re.search(
                  r'(hr\s*=\s*d3d12_pipeline_state_create\s*\([^;]+;)',
                  c, re.DOTALL)

          if pattern:
              after = c[pattern.end():]
              ret_match = re.search(r'return\s+hr\s*;', after)
              if ret_match:
                  insert_pos = pattern.end() + ret_match.start()
              else:
                  insert_pos = pattern.end()

              fallback = (
                  '\n\n    /* adreno_fallback: log Adreno PSO creation failures */\n'
                  '    if (FAILED(hr) && device->device_info.properties2.properties.vendorID == 0x5143u)\n'
                  '        WARN("Adreno: PSO creation failed (hr %#x). Game may have rendering issues.\\n", hr);\n'
              )
              c = c[:insert_pos] + fallback + c[insert_pos:]
              with open(path, "w", encoding="utf-8") as f:
                  f.write(c)
              print(f"Adreno PSO fallback: applied at char {insert_pos} in device.c")
          else:
              print("ERROR: d3d12_pipeline_state_create call not found in device.c"); exit(1)
          PYEOF

      - name: Apply Adreno Tiled GPU + Rendering Patches
        run: |
          cd src
          cat > patch.py << 'PYSCRIPT'
          import re, os, sys

          errors = []
          group_stats = {}

          def patch_file(path, patches, group="unnamed"):
              global errors, group_stats
              if not os.path.exists(path):
                  return 0
              try:
                  with open(path, "r", encoding="utf-8", errors="ignore") as f:
                      c = f.read()
              except Exception as e:
                  errors.append(f"Read error {path}: {e}"); return 0
              orig = c
              count = 0
              for p, r in patches:
                  if re.search(p, c):
                      c = re.sub(p, r, c)
                      count += 1
              if c != orig:
                  try:
                      with open(path, "w", encoding="utf-8") as f:
                          f.write(c)
                  except Exception as e:
                      errors.append(f"Write error {path}: {e}")
              if group not in group_stats:
                  group_stats[group] = {"applied": 0, "files": []}
              group_stats[group]["applied"] += count
              if count > 0:
                  group_stats[group]["files"].append(f"{os.path.basename(path)}:{count}")
              return count



          dev = [
              (r'(\.UMA\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(\.CacheCoherentUMA\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(\.IsolatedMMU\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(data->HighestShaderModel\s*=\s*)[^;]+;', r'\g<1>D3D_SHADER_MODEL_6_7;'),
              (r'(info\.HighestShaderModel\s*=\s*)[^;]+;', r'\g<1>D3D_SHADER_MODEL_6_7;'),
              (r'(MaxSupportedFeatureLevel\s*=\s*)[^;]+;', r'\g<1>D3D_FEATURE_LEVEL_12_2;'),
              (r'(D3D12SDKVersion\s*=\s*)[^;]+;', r'\g<1>613;'),
              (r'(options1\.WaveOps\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(options1\.WaveLaneCountMin\s*=\s*)[^;]+;', r'\g<1>64;'),
              (r'(options1\.WaveLaneCountMax\s*=\s*)[^;]+;', r'\g<1>128;'),
              (r'(options1\.Int64ShaderOps\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(options1\.ExpandedComputeResourceStates\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(options2\.DepthBoundsTestSupported\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(options2\.ProgrammableSamplePositionsTier\s*=\s*)[^;]+;', r'\g<1>D3D12_PROGRAMMABLE_SAMPLE_POSITIONS_TIER_2;'),
              (r'(options3\.BarycentricsSupported\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(options3\.ThresholdCoefficientsSupported\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(options4\.Native16BitShaderOpsSupported\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(options4\.MSAAOperationsSupported\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(options5\.RaytracingTier\s*=\s*)[^;]+;', r'\g<1>D3D12_RAYTRACING_TIER_1_1;'),
              (r'(options5\.RenderPassesTier\s*=\s*)[^;]+;', r'\g<1>D3D12_RENDER_PASS_TIER_2;'),
              (r'(options5\.SRVOnlyTiledResourceTier3\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(options6\.VariableShadingRateTier\s*=\s*)[^;]+;', r'\g<1>D3D12_VARIABLE_SHADING_RATE_TIER_2;'),
              (r'(options6\.ShadingRateImageTileSize\s*=\s*)[^;]+;', r'\g<1>8;'),
              (r'(options6\.AdditionalShadingRatesSupported\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(options6\.BackgroundProcessingSupported\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(options6\.PerPrimitiveShadingRateSupportedWithViewportIndexing\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(options7\.MeshShaderTier\s*=\s*)[^;]+;', r'\g<1>D3D12_MESH_SHADER_TIER_NOT_SUPPORTED;'),
              (r'(options7\.SamplerFeedbackTier\s*=\s*)[^;]+;', r'\g<1>D3D12_SAMPLER_FEEDBACK_TIER_1_0;'),
              (r'(options\.ResourceBindingTier\s*=\s*)[^;]+;', r'\g<1>D3D12_RESOURCE_BINDING_TIER_3;'),
              (r'(options\.TiledResourcesTier\s*=\s*)[^;]+;', r'\g<1>D3D12_TILED_RESOURCES_TIER_3;'),
              (r'(options\.ResourceHeapTier\s*=\s*)[^;]+;', r'\g<1>D3D12_RESOURCE_HEAP_TIER_2;'),
              (r'(options\.ConservativeRasterizationTier\s*=\s*)[^;]+;', r'\g<1>D3D12_CONSERVATIVE_RASTERIZATION_TIER_3;'),
              (r'(options\.ROVsSupported\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(options\.DoublePrecisionFloatShaderOps\s*=\s*)[^;]+;', r'\g<1>FALSE;'),
              (r'(options\.TypedUAVLoadAdditionalFormats\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(options\.OutputMergerLogicOp\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(options\.PSSpecifiedStencilRefSupported\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(options12\.EnhancedBarriersSupported\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(options12\.RelaxedFormatCastingSupported\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(options12\.UnifiedImageLayoutsSupported\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(options16\.GPUUploadHeapSupported\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
              (r'(options18\.RenderPassesValid\s*=\s*)[^;]+;', r'\g<1>TRUE;'),
          ]

          tbr_patches = [
              (r'(TileBasedRenderer\s*(?<!=)=(?!=)\s*)FALSE', r'\g<1>TRUE'),
              (r'(tile_based_renderer\s*(?<!=)=(?!=)\s*)false', r'\g<1>true'),
              (r'(->use_tile_based_rendering\s*=\s*)false', r'\1true'),
          ]

          uma_patches = [
              (r'(VKD3D_CONFIG_FLAG_FORCE_HOST_CACHED)', r'\1 /* uma patched */'),
          ]

          fence_patches = [
              (r'(VKD3D_CONFIG_FLAG_RECYCLE_COMMAND_POOLS)', r'\1 /* fence patched */'),
          ]

          swapchain_patches = [
              (r'(chain->frame_latency\s*(?<!=)=(?!=)\s*)\d+', r'\g<1>3'),
              (r'(frame_latency_internal\s*(?<!=)=(?!=)\s*)\d+', r'\g<1>3'),
              (r'(MaxLatency\s*>\s*chain->frame_latency)', r'MaxLatency > 8 /* patched */'),
          ]

          swapchain_blit_safety = [
              (r'(blit_command\s*=\s*)!blank_present\s*&&[^;]+;', r'\g<1>false;'),
              (r'(imageUsage\s*=\s*)VK_IMAGE_USAGE_COLOR_ATTACHMENT_BIT\s*\|\s*VK_IMAGE_USAGE_TRANSFER_DST_BIT',
               r'\g<1>VK_IMAGE_USAGE_COLOR_ATTACHMENT_BIT'),
          ]

          submission_patches = [
              (r'(submission_thread_tid\s*(?<!=)=(?!=)\s*)', r'\1/* patched */ '),
          ]

          gpu_boost_patches = [
              (r'(concurrent_queue_family_buffer_count\s*(?<!=)=(?!=)\s*)\d+', r'\g<1>0 /* patched */'),
              (r'(concurrent_queue_family_image_count\s*(?<!=)=(?!=)\s*)\d+', r'\g<1>0 /* patched */'),
          ]

          # === APPLY PATCHES ===
          patch_file("libs/vkd3d/device.c", dev, "dev_features")
          patch_file("libs/vkd3d/device.c", uma_patches, "uma")
          patch_file("libs/vkd3d/device.c", tbr_patches, "tbr")
          patch_file("libs/vkd3d/device.c", fence_patches, "fence")
          patch_file("libs/vkd3d/device.c", gpu_boost_patches, "gpu_boost")
          patch_file("libs/vkd3d/swapchain.c", swapchain_patches, "swapchain")
          patch_file("libs/vkd3d/swapchain.c", swapchain_blit_safety, "blit_safety")
          patch_file("libs/vkd3d/command.c", submission_patches, "submission")

          # === PATCH SUMMARY ===
          total = sum(g["applied"] for g in group_stats.values())
          print(f"\n{'='*60}")
          print(f"PATCH SUMMARY — {total} total modifications")
          print(f"{'='*60}")
          warn_groups = []
          for name, stats in sorted(group_stats.items()):
              files_str = ", ".join(stats["files"]) if stats["files"] else "no matches"
              status = "OK" if stats["applied"] > 0 else "WARN"
              if stats["applied"] == 0:
                  warn_groups.append(name)
              print(f"  [{status:4s}] {name:20s} : {stats['applied']:3d} matches ({files_str})")
          print(f"{'='*60}")
          if warn_groups:
              print(f"WARNING: {len(warn_groups)} group(s) had zero matches: {', '.join(warn_groups)}")
          if errors:
              print(f"ERRORS: {len(errors)}")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          PYSCRIPT
          python3 patch.py

      - name: Apply Command Submit ERR Downgrade
        run: |
          cd src
          python3 - << 'PYEOF'
          import re, os

          # Downgrade non-fatal ERR() to WARN() in command submission hot paths.
          # ERR() flushes stderr synchronously which stalls the submission thread.
          count = 0
          for f in ["libs/vkd3d/command.c", "libs/vkd3d/queue.c", "libs/vkd3d/queue_timeline.c"]:
              if not os.path.exists(f):
                  continue
              with open(f, "r", encoding="utf-8") as fh:
                  c = fh.read()
              orig = c
              for old_str in [
                  'ERR("Failed to wait for fence',
                  'ERR("Failed to submit',
                  'ERR("Failed to signal',
                  'ERR("Fence wait timeout',
                  'ERR("Queue submit failed',
              ]:
                  c = c.replace(old_str, old_str.replace('ERR(', 'WARN(', 1))
              if c != orig:
                  with open(f, "w", encoding="utf-8") as fh:
                      fh.write(c)
                  count += 1
                  print(f"ERR→WARN downgrade: {os.path.basename(f)}")
          print(f"Command submit ERR downgrade: {count} file(s) patched")
          PYEOF

      - name: Apply State Blend Fix
        run: |
          cd src
          python3 - << 'PYEOF'
          import sys
          path = "libs/vkd3d/state.c"
          with open(path, "r", encoding="utf-8") as f:
              c = f.read()
          old = (
              'ERR("Enabling blending on RT %u with format %s, '
              'but using integer format is not supported.\\n", i,\n'
              '                            debug_dxgi_format(desc->rtv_formats.RTFormats[i]));\n'
              '                    return E_INVALIDARG;'
          )
          new = (
              'WARN("Force-disabling blending on RT %u (integer format %s), '
              'preventing GPU hang.\\n", i,\n'
              '                            debug_dxgi_format(desc->rtv_formats.RTFormats[i]));\n'
              '                    state->graphics.blend_attachments[i].blendEnable = VK_FALSE;\n'
              '                    break;'
          )
          if old not in c:
              print("WARN: blend patch target not found — may already be patched", file=sys.stderr)
          else:
              c = c.replace(old, new, 1)
              with open(path, "w", encoding="utf-8") as f:
                  f.write(c)
              print("State blend fix: applied")
          PYEOF

      - name: Apply Transfer Queue Fix
        run: |
          cd src
          python3 - << 'PYEOF'
          import sys, re

          # Issue #2950: transfer queue using dedicated VK_QUEUE_TRANSFER_BIT family causes
          # severe CPU-side performance regression (79fps -> 54fps on HZD Remastered).
          # Fix: alias TRANSFER queue family to COMPUTE family — eliminates cross-family sync.
          # Verified fix by veldenb on descriptor-heap-rebase branch.
          path = "libs/vkd3d/device.c"
          with open(path, "r", encoding="utf-8") as f:
              c = f.read()

          old = (
              'info->family_index[VKD3D_QUEUE_FAMILY_TRANSFER] = vkd3d_find_queue(count, queue_properties,\n'
              '            VK_QUEUE_GRAPHICS_BIT | VK_QUEUE_COMPUTE_BIT | VK_QUEUE_TRANSFER_BIT, VK_QUEUE_TRANSFER_BIT);'
          )
          new = (
              'info->family_index[VKD3D_QUEUE_FAMILY_TRANSFER] = info->family_index[VKD3D_QUEUE_FAMILY_COMPUTE];'
          )

          if old not in c:
              alt_pattern = r'family_index\[VKD3D_QUEUE_FAMILY_TRANSFER\]\s*=\s*vkd3d_find_queue\([^;]+VK_QUEUE_TRANSFER_BIT[^;]+;'
              if re.search(alt_pattern, c):
                  c = re.sub(
                      alt_pattern,
                      'info->family_index[VKD3D_QUEUE_FAMILY_TRANSFER] = info->family_index[VKD3D_QUEUE_FAMILY_COMPUTE];',
                      c, count=1
                  )
                  with open(path, "w", encoding="utf-8") as f:
                      f.write(c)
                  print("Transfer queue fix: applied (regex path)")
              else:
                  print("WARN: transfer queue patch target not found — may already be patched", file=sys.stderr)
          else:
              c = c.replace(old, new, 1)
              with open(path, "w", encoding="utf-8") as f:
                  f.write(c)
              print("Transfer queue fix: applied")
          PYEOF

      - name: Apply Heavy Game Resource Fixes
        run: |
          cd src
          python3 - << 'PYEOF'
          import sys, re, os

          # ── 1. Texture Placement Alignment Roundup ─────────────────────────────────
          # Issue pattern #2927: d3d12_resource_validate_texture_alignment rejects 4KB
          # alignment (0x1000) instead of rounding up to D3D12_DEFAULT_RESOURCE_PLACEMENT_ALIGNMENT
          # (0x10000 = 64KB). Causes VK_ERROR_DEVICE_LOST in DeferredSkinning pass.
          # Affected games: The Last of Us Part II, Alan Wake 2, RE Requiem pattern.
          resource_c = "libs/vkd3d/resource.c"
          if os.path.exists(resource_c):
              with open(resource_c, "r", encoding="utf-8") as f:
                  c = f.read()
              orig = c

              if "heavy_alignment_clamp" not in c:
                  helper = (
                      "/* heavy_alignment_clamp: sub-64KB placement alignment → D3D12_DEFAULT */\n"
                      "static inline UINT64 vkd3d_clamp_placement_alignment(UINT64 a)\n"
                      "{\n"
                      "    return (a && a < D3D12_DEFAULT_RESOURCE_PLACEMENT_ALIGNMENT)\n"
                      "        ? (UINT64)D3D12_DEFAULT_RESOURCE_PLACEMENT_ALIGNMENT : a;\n"
                      "}\n\n"
                  )
                  m = re.search(r'd3d12_resource_validate_texture_alignment', c)
                  if m:
                      insert = c.rfind('\n', 0, m.start()) + 1
                      c = c[:insert] + helper + c[insert:]

                  c = re.sub(
                      r'(WARN\s*\(\s*"[^"]*[Aa]lignment[^"]*\\n"[^)]*\)\s*;\s*\n\s*)return\s+E_INVALIDARG\s*;',
                      r'/* heavy_alignment_clamp: soft-fail alignment rejection */\n',
                      c
                  )

              if c != orig:
                  with open(resource_c, "w", encoding="utf-8") as f:
                      f.write(c)
                  print("Texture alignment roundup: applied")
              else:
                  print("WARN: texture alignment patch — no changes applied", file=sys.stderr)
          else:
              print(f"WARN: {resource_c} not found", file=sys.stderr)

          # ── 2. Compute Pipeline Soft-Fail ──────────────────────────────────────────
          # VKD3D v3.0: compute pipeline creation is in state.c
          # Downgrade ERR to WARN so the game continues instead of crashing
          for sf in ["libs/vkd3d/state.c", "libs/vkd3d/pipeline.c"]:
              if not os.path.exists(sf):
                  continue
              with open(sf, "r", encoding="utf-8") as f:
                  c = f.read()
              orig = c
              if "heavy_compute_softfail" not in c:
                  c = re.sub(
                      r'ERR\(\s*"Failed to create Vulkan compute pipeline',
                      r'/* heavy_compute_softfail */ WARN("Failed to create Vulkan compute pipeline',
                      c, count=1
                  )
              if c != orig:
                  with open(sf, "w", encoding="utf-8") as f:
                      f.write(c)
                  print(f"Compute pipeline soft-fail: applied in {os.path.basename(sf)}")
                  break
          else:
              print("WARN: compute pipeline soft-fail target not found", file=sys.stderr)

          # ── 3. Root Signature: Increase Max CBV/SRV/UAV Ranges ─────────────────────
          # Heavy DX12 games (Spider-Man 2, Alan Wake 2) bind large root signatures.
          # Increase per-stage binding limits to avoid E_INVALIDARG on RS creation.
          for fname in ["libs/vkd3d/root_signature.c", "libs/vkd3d/state.c"]:
              if not os.path.exists(fname):
                  continue
              with open(fname, "r", encoding="utf-8") as f:
                  c = f.read()
              orig = c
              c = re.sub(
                  r'(maxPerStageDescriptorSampledImages\s*(?<!=)=(?!=)\s*)\d+\s*;',
                  r'\g<1>1000000;', c
              )
              c = re.sub(
                  r'(maxPerStageDescriptorStorageImages\s*(?<!=)=(?!=)\s*)\d+\s*;',
                  r'\g<1>1000000;', c
              )
              c = re.sub(
                  r'(maxPerStageDescriptorUniformBuffers\s*(?<!=)=(?!=)\s*)\d+\s*;',
                  r'\g<1>1000000;', c
              )
              if c != orig:
                  with open(fname, "w", encoding="utf-8") as f:
                      f.write(c)
                  print(f"Root signature descriptor limits: applied in {os.path.basename(fname)}")

          print("Heavy game resource fixes: complete")
          PYEOF

      - name: Create Cross Files
        run: |
          cat > crossfile-arm64ec.txt << EOF
          [binaries]
          c = '${TOOLCHAIN_DIR}/bin/arm64ec-w64-mingw32-clang'
          cpp = '${TOOLCHAIN_DIR}/bin/arm64ec-w64-mingw32-clang++'
          ar = '${TOOLCHAIN_DIR}/bin/llvm-ar'
          strip = '${TOOLCHAIN_DIR}/bin/llvm-strip'
          windres = '${TOOLCHAIN_DIR}/bin/arm64ec-w64-mingw32-windres'
          widl = '${TOOLCHAIN_DIR}/bin/arm64ec-w64-mingw32-widl'
          [host_machine]
          system = 'windows'
          cpu_family = 'aarch64'
          cpu = 'arm64ec'
          endian = 'little'
          [built-in options]
          c_link_args = ['-lmingwex', '-lmsvcrt', '-lucrt']
          cpp_link_args = ['-lmingwex', '-lmsvcrt', '-lucrt', '-lc++', '-lc++abi', '-lunwind']
          EOF

          cat > crossfile-x86.txt << EOF
          [binaries]
          c = '${TOOLCHAIN_DIR}/bin/i686-w64-mingw32-clang'
          cpp = '${TOOLCHAIN_DIR}/bin/i686-w64-mingw32-clang++'
          ar = '${TOOLCHAIN_DIR}/bin/llvm-ar'
          strip = '${TOOLCHAIN_DIR}/bin/llvm-strip'
          windres = '${TOOLCHAIN_DIR}/bin/i686-w64-mingw32-windres'
          widl = '${TOOLCHAIN_DIR}/bin/i686-w64-mingw32-widl'
          [host_machine]
          system = 'windows'
          cpu_family = 'x86'
          cpu = 'i686'
          endian = 'little'
          EOF

      - name: Build ARM64EC + x86
        run: |
          export PATH="$TOOLCHAIN_DIR/bin:$PATH"
          cd src

          meson setup build-arm64ec \
            --cross-file ../crossfile-arm64ec.txt \
            --buildtype release \
            -Db_ndebug=true \
            -Dstrip=true
          ninja -C build-arm64ec -j2 2>&1 | tee build-arm64ec.log
          [[ ${PIPESTATUS[0]} -eq 0 ]] || { tail -n 50 build-arm64ec.log; exit 1; }

          meson setup build-x86 \
            --cross-file ../crossfile-x86.txt \
            --buildtype release \
            -Db_ndebug=true \
            -Dstrip=true
          ninja -C build-x86 -j2 2>&1 | tee build-x86.log
          [[ ${PIPESTATUS[0]} -eq 0 ]] || { tail -n 50 build-x86.log; exit 1; }

      - name: Verify Build
        run: |
          for arch in arm64ec x86; do
            for dll in d3d12.dll d3d12core.dll; do
              DLL=$(find src/build-${arch} -name "$dll" -type f | head -1)
              [[ -z "$DLL" ]] && { echo "Missing: $arch/$dll"; exit 1; }
              echo "$DLL: $(numfmt --to=iec $(stat -c%s "$DLL"))"
            done
          done

      - name: Create Package
        run: |
          mkdir -p pkg/system32 pkg/syswow64
          for dll in d3d12.dll d3d12core.dll; do
            SRC=$(find src/build-arm64ec -name "$dll" -type f | head -1)
            [[ -n "$SRC" ]] && cp "$SRC" pkg/system32/
            SRC=$(find src/build-x86 -name "$dll" -type f | head -1)
            [[ -n "$SRC" ]] && cp "$SRC" pkg/syswow64/
          done
          # Meson -Dstrip=true handles stripping during build

          cat > pkg/profile.json << JSONEOF
          {
            "type": "VKD3D",
            "versionName": "${VER}-arm64ec-${COMMIT}",
            "versionCode": 0,
            "description": "vkd3d-proton arm64ec",
            "files": [
              {"source": "system32/d3d12.dll", "target": "\${system32}/d3d12.dll"},
              {"source": "system32/d3d12core.dll", "target": "\${system32}/d3d12core.dll"},
              {"source": "syswow64/d3d12.dll", "target": "\${syswow64}/d3d12.dll"},
              {"source": "syswow64/d3d12core.dll", "target": "\${syswow64}/d3d12core.dll"}
            ]
          }
          JSONEOF

          PKG="vkd3d-proton-arm64ec-v${VER}-${COMMIT}"
          cd pkg && tar --zstd -cf "../${PKG}.wcp" . && cd ..
          echo "PKG=$PKG" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG }}
          path: ${{ env.PKG }}.wcp
          retention-days: 30

      - name: Cleanup
        if: always()
        run: rm -rf src out pkg vk-headers spirv-h .venv
