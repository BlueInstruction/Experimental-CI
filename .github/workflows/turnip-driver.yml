name: Turnip-Driver

on:
  workflow_dispatch:
    inputs:
      mesa_source:
        type: choice
        description: "Mesa source"
        default: "adreno_main"
        options:
          - adreno_main
          - clean_main
          - latest_release
          - staging_branch
          - main_branch
          - custom_tag
          - latest_main

      staging_branch:
        type: choice
        description: "Staging branch"
        default: "staging/26.0"
        options:
          - staging/26.0
          - staging/25.3

      custom_tag:
        description: "Custom tag (used when mesa_source = custom_tag)"
        required: false
        default: ""

      build_type:
        type: choice
        description: "Build type"
        default: "release"
        options:
          - release
          - debug
          - debugoptimized

      build_variant:
        type: choice
        description: "Build variant"
        default: "optimized"
        options:
          - optimized
          - debug
          - profile
          - vanilla

      enable_deck_emu:
        type: boolean
        description: "Enable Adreno 750 Windows identity (vendorID 0x5143, apiVersion 1.3.295, 20 GiB heap)"
        default: true

      enable_timeline_hack:
        type: boolean
        description: "Enable timeline semaphore optimization (improves DXVK performance)"
        default: true

      enable_ubwc_hack:
        type: boolean
        description: "Enable UBWC 5/6 support"
        default: true

      apply_patch_series:
        type: boolean
        description: "Apply patch series from patches/series/ if present"
        default: true

      build_number:
        description: "Build number (e.g. 1, 2, 3) — used in filename Turnip_v{version}-B{number}"
        required: false
        default: "1"

permissions:
  contents: write

env:
  NDK_VERSION: "android-ndk-r29"
  API_LEVEL: "35"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl unzip zip \
            python3 python3-pip python3-mako \
            ninja-build ccache patchelf \
            flex bison \
            glslang-tools
          pip install --break-system-packages meson mako pyyaml

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/android-ndk
          key: ${{ env.NDK_VERSION }}

      - name: Setup NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://dl.google.com/android/repository/${{ env.NDK_VERSION }}-linux.zip" -o ndk.zip
          unzip -q ndk.zip
          mv ${{ env.NDK_VERSION }} android-ndk

      - name: Build Turnip driver
        id: build
        run: |
          chmod +x turnip-driver.sh
          export MESA_SOURCE="${{ inputs.mesa_source || 'adreno_main' }}"
          export STAGING_BRANCH="${{ inputs.staging_branch || 'staging/26.0' }}"
          export CUSTOM_TAG="${{ inputs.custom_tag || '' }}"
          export BUILD_TYPE="${{ inputs.build_type || 'release' }}"
          export BUILD_VARIANT="${{ inputs.build_variant || 'optimized' }}"
          export NDK_PATH="${{ github.workspace }}/android-ndk"
          export API_LEVEL="${{ env.API_LEVEL }}"
          export ENABLE_DECK_EMU="${{ github.event.inputs.enable_deck_emu != '' && github.event.inputs.enable_deck_emu || 'true' }}"
          export ENABLE_TIMELINE_HACK="${{ github.event.inputs.enable_timeline_hack != '' && github.event.inputs.enable_timeline_hack || 'true' }}"
          export ENABLE_UBWC_HACK="${{ github.event.inputs.enable_ubwc_hack != '' && github.event.inputs.enable_ubwc_hack || 'true' }}"
          export APPLY_PATCH_SERIES="${{ github.event.inputs.apply_patch_series != '' && github.event.inputs.apply_patch_series || 'true' }}"
          export BUILD_NUMBER="${{ inputs.build_number || '1' }}"

          bash turnip-driver.sh

          echo "version=$(cat build/version.txt)"               >> $GITHUB_OUTPUT
          echo "filename=$(cat build/filename.txt)"             >> $GITHUB_OUTPUT
          echo "vulkan_version=$(cat build/vulkan_version.txt)" >> $GITHUB_OUTPUT
          echo "build_date=$(cat build/build_date.txt)"         >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.filename }}
          path: build/*.zip
