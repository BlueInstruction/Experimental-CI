name: Turnip Driver

on:
  workflow_dispatch:
    inputs:

      mesa_source:
        type: choice
        description: "Mesa source (adreno_main = BlueInstruction fork, clean_main = upstream + CI patches)"
        default: "adreno_main"
        options:
          - adreno_main
          - clean_main
          - latest_release
          - staging_branch
          - main_branch
          - custom_tag

      staging_branch:
        type: choice
        description: "Staging branch (used when mesa_source = staging_branch)"
        default: "staging/26.0"
        options:
          - staging/26.0
          - staging/25.3

      custom_tag:
        description: "Custom tag (used when mesa_source = custom_tag)"
        required: false
        default: ""

      build_type:
        type: choice
        description: "Build type"
        default: "release"
        options:
          - release
          - debug
          - debugoptimized

      build_variant:
        type: choice
        description: "Build variant (optimized = all patches, vanilla = no patches, debug/profile = dev builds)"
        default: "optimized"
        options:
          - optimized
          - debug
          - profile
          - vanilla

      enable_deck_emu:
        type: boolean
        description: "Enable A750 Windows identity — apiVersion 1.3.295 / 2 GiB heap (TU_DEBUG=deck_emu)"
        default: true

      enable_timeline_hack:
        type: boolean
        description: "Enable timeline semaphore optimization (reduces DXVK/VKD3D CPU overhead)"
        default: true

      enable_ubwc_hack:
        type: boolean
        description: "Enable UBWC version 5/6 support (A750 bandwidth fix)"
        default: true

      enable_a7xx_fixes:
        type: boolean
        description: "Enable A7xx stability fixes (branch_and_or, compute_constlen, mesh_shader disable)"
        default: true

      enable_quest3:
        type: boolean
        description: "Enable Quest 3 FD740 GPU registration"
        default: true

      apply_patch_series:
        type: boolean
        description: "Apply patch series from patches/series/ directory if present"
        default: true

      build_number:
        description: "Build number (used in filename Turnip_v{version}-B{number})"
        required: false
        default: "1"

permissions:
  contents: write

env:
  NDK_VERSION: "android-ndk-r29"
  API_LEVEL: "36"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl unzip zip \
            python3 python3-pip python3-mako \
            ninja-build ccache patchelf \
            flex bison \
            glslang-tools \
            ca-certificates
          pip install --break-system-packages meson mako pyyaml

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/android-ndk
          key: ${{ env.NDK_VERSION }}-v2

      - name: Download NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          echo "Downloading ${{ env.NDK_VERSION }}..."
          curl -fsSL "https://dl.google.com/android/repository/${{ env.NDK_VERSION }}-linux.zip" -o ndk.zip
          unzip -q ndk.zip
          mv "${{ env.NDK_VERSION }}" android-ndk
          rm -f ndk.zip
          echo "NDK ready: $(du -sh android-ndk | cut -f1)"

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-turnip-${{ inputs.mesa_source || 'adreno_main' }}-${{ github.run_id }}
          restore-keys: |
            ccache-turnip-${{ inputs.mesa_source || 'adreno_main' }}-
            ccache-turnip-

      - name: Configure ccache
        run: |
          ccache --max-size=2G
          ccache --zero-stats
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: Build Turnip driver
        id: build
        run: |
          chmod +x turnip-driver.sh

          export MESA_SOURCE="${{ inputs.mesa_source || 'adreno_main' }}"
          export STAGING_BRANCH="${{ inputs.staging_branch || 'staging/26.0' }}"
          export CUSTOM_TAG="${{ inputs.custom_tag || '' }}"
          export BUILD_TYPE="${{ inputs.build_type || 'release' }}"
          export BUILD_VARIANT="${{ inputs.build_variant || 'optimized' }}"
          export NDK_PATH="${{ github.workspace }}/android-ndk"
          export API_LEVEL="${{ env.API_LEVEL }}"
          export BUILD_NUMBER="${{ inputs.build_number || '1' }}"

          export ENABLE_DECK_EMU="${{ inputs.enable_deck_emu != '' && inputs.enable_deck_emu || 'true' }}"
          export ENABLE_TIMELINE_HACK="${{ inputs.enable_timeline_hack != '' && inputs.enable_timeline_hack || 'true' }}"
          export ENABLE_UBWC_HACK="${{ inputs.enable_ubwc_hack != '' && inputs.enable_ubwc_hack || 'true' }}"
          export ENABLE_A7XX_FIXES="${{ inputs.enable_a7xx_fixes != '' && inputs.enable_a7xx_fixes || 'true' }}"
          export ENABLE_QUEST3="${{ inputs.enable_quest3 != '' && inputs.enable_quest3 || 'true' }}"
          export APPLY_PATCH_SERIES="${{ inputs.apply_patch_series != '' && inputs.apply_patch_series || 'true' }}"

          bash turnip-driver.sh

          echo "version=$(cat build/version.txt)"               >> $GITHUB_OUTPUT
          echo "filename=$(cat build/filename.txt)"             >> $GITHUB_OUTPUT
          echo "vulkan_version=$(cat build/vulkan_version.txt)" >> $GITHUB_OUTPUT
          echo "build_date=$(cat build/build_date.txt)"         >> $GITHUB_OUTPUT

      - name: Print ccache stats
        if: always()
        run: ccache --show-stats

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.filename }}
          path: build/*.zip
          retention-days: 30
