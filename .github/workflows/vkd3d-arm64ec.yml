name: Vkd3d Proton Arm64ec

on:
  workflow_dispatch:
    inputs:
      VERSION:
        description: "vkd3d-proton tag/ref or latest"
        required: false
        default: "latest"
      LLVM_MINGW_TAG:
        description: "llvm-mingw release tag or latest"
        required: false
        default: "latest"
      VULKAN_HEADERS_REF:
        description: "Vulkan-Headers tag/ref, latest, or main"
        required: false
        default: "latest"
      BUILD_TYPE:
        description: "Meson build type"
        type: choice
        default: "release"
        options:
          - release
          - debug
      PATCH_PROFILE:
        description: "Patch profile"
        type: choice
        default: "balanced"
        options:
          - none
          - balanced
          - aggressive
      PUBLISH_RELEASE:
        description: "Create GitHub release"
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  PYTHONUNBUFFERED: "1"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      vkd3d_ref: ${{ steps.resolve.outputs.vkd3d_ref }}
      llvm_mingw_tag: ${{ steps.resolve.outputs.llvm_mingw_tag }}
      vulkan_headers_ref: ${{ steps.resolve.outputs.vulkan_headers_ref }}
      source_commit: ${{ steps.resolve.outputs.source_commit }}
      version: ${{ steps.resolve.outputs.version }}
      build_date: ${{ steps.resolve.outputs.build_date }}
      build_stamp: ${{ steps.resolve.outputs.build_stamp }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      package_name: ${{ steps.resolve.outputs.package_name }}
    steps:
      - name: Resolve build inputs
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.VERSION }}
          INPUT_LLVM_MINGW_TAG: ${{ inputs.LLVM_MINGW_TAG }}
          INPUT_VULKAN_HEADERS_REF: ${{ inputs.VULKAN_HEADERS_REF }}
        run: |
          set -euo pipefail

          resolve_vkd3d_ref() {
            local ref="${1:-}"
            if [[ -z "$ref" || "$ref" == "latest" ]]; then
              gh api repos/HansKristian-Work/vkd3d-proton/releases/latest --jq .tag_name
            else
              printf '%s\n' "$ref"
            fi
          }

          resolve_llvm_mingw_tag() {
            local ref="${1:-}"
            if [[ -z "$ref" || "$ref" == "latest" ]]; then
              gh api repos/mstorsjo/llvm-mingw/releases/latest --jq .tag_name
            else
              printf '%s\n' "$ref"
            fi
          }

          resolve_vulkan_headers_ref() {
            local ref="${1:-}"
            if [[ -z "$ref" || "$ref" == "latest" ]]; then
              git ls-remote --tags --refs https://github.com/KhronosGroup/Vulkan-Headers.git 'v*' \
                | awk '{print $2}' \
                | sed 's#refs/tags/##' \
                | sort -V \
                | tail -n 1
            else
              printf '%s\n' "$ref"
            fi
          }

          resolve_commit() {
            local ref="$1"
            local commit=""

            commit="$(git ls-remote https://github.com/HansKristian-Work/vkd3d-proton.git "refs/tags/${ref}^{}" | awk 'NR==1 {print $1}')"
            if [[ -z "$commit" ]]; then
              commit="$(git ls-remote https://github.com/HansKristian-Work/vkd3d-proton.git "refs/tags/${ref}" | awk 'NR==1 {print $1}')"
            fi
            if [[ -z "$commit" ]]; then
              commit="$(git ls-remote https://github.com/HansKristian-Work/vkd3d-proton.git "refs/heads/${ref}" | awk 'NR==1 {print $1}')"
            fi
            if [[ -z "$commit" ]]; then
              echo "Unable to resolve commit for ref: ${ref}" >&2
              exit 1
            fi

            printf '%s\n' "${commit:0:7}"
          }

          vkd3d_ref="$(resolve_vkd3d_ref "$INPUT_VERSION")"
          llvm_mingw_tag="$(resolve_llvm_mingw_tag "$INPUT_LLVM_MINGW_TAG")"
          vulkan_headers_ref="$(resolve_vulkan_headers_ref "$INPUT_VULKAN_HEADERS_REF")"
          source_commit="$(resolve_commit "$vkd3d_ref")"
          version="${vkd3d_ref#v}"
          build_date="$(date -u +%Y%m%d)"
          build_stamp="$(date -u +%Y%m%d-%H%M%S)"
          release_tag="vkd3d-proton-${version}-arm64ec-${build_stamp}"
          package_name="vkd3d-proton-${version}-arm64ec-${source_commit}"

          {
            echo "vkd3d_ref=$vkd3d_ref"
            echo "llvm_mingw_tag=$llvm_mingw_tag"
            echo "vulkan_headers_ref=$vulkan_headers_ref"
            echo "source_commit=$source_commit"
            echo "version=$version"
            echo "build_date=$build_date"
            echo "build_stamp=$build_stamp"
            echo "release_tag=$release_tag"
            echo "package_name=$package_name"
          } >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64ec
            triplet: arm64ec-w64-mingw32
            cpu_family: aarch64
            cpu: aarch64
            package_dir: system32
          - arch: x86
            triplet: i686-w64-mingw32
            cpu_family: x86
            cpu: i686
            package_dir: syswow64
    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.x"

      - name: Restore pip cache
        uses: actions/cache@v5.0.4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-meson

      - name: Restore llvm-mingw cache
        id: llvm-cache
        uses: actions/cache@v5.0.4
        with:
          path: ${{ runner.temp }}/llvm-mingw
          key: llvm-mingw-${{ runner.os }}-${{ needs.prepare.outputs.llvm_mingw_tag }}-ubuntu-22.04-x86_64

      - name: Restore ccache
        uses: actions/cache@v5.0.4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ matrix.arch }}-${{ needs.prepare.outputs.vkd3d_ref }}-${{ needs.prepare.outputs.llvm_mingw_tag }}-${{ inputs.BUILD_TYPE }}-${{ inputs.PATCH_PROFILE }}-${{ hashFiles('.github/workflows/vkd3d-arm64ec.yml', 'scripts/patch-vkd3d-proton-arm64ec.py') }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.arch }}-${{ needs.prepare.outputs.vkd3d_ref }}-${{ needs.prepare.outputs.llvm_mingw_tag }}-${{ inputs.BUILD_TYPE }}-${{ inputs.PATCH_PROFILE }}-
            ccache-${{ runner.os }}-${{ matrix.arch }}-

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            ccache \
            curl \
            git \
            jq \
            ninja-build \
            glslang-tools \
            rsync \
            spirv-tools \
            unzip \
            wget \
            zstd
          python -m pip install --upgrade pip meson

      - name: Download llvm-mingw
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        env:
          LLVM_MINGW_TAG: ${{ needs.prepare.outputs.llvm_mingw_tag }}
        run: |
          set -euo pipefail
          archive="llvm-mingw-${LLVM_MINGW_TAG}-ucrt-ubuntu-22.04-x86_64.tar.xz"
          url="https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_MINGW_TAG}/${archive}"
          curl -fsSL "$url" -o "$RUNNER_TEMP/llvm-mingw.tar.xz"
          mkdir -p "$RUNNER_TEMP/llvm-mingw"
          tar -C "$RUNNER_TEMP/llvm-mingw" --strip-components=1 -xJf "$RUNNER_TEMP/llvm-mingw.tar.xz"

      - name: Configure toolchain environment
        run: |
          set -euo pipefail
          echo "$RUNNER_TEMP/llvm-mingw/bin" >> "$GITHUB_PATH"
          {
            echo "CCACHE_DIR=$HOME/.ccache"
            echo "CCACHE_BASEDIR=$GITHUB_WORKSPACE"
            echo "CCACHE_COMPILERCHECK=content"
            echo "CCACHE_MAXSIZE=2G"
          } >> "$GITHUB_ENV"

      - name: Verify toolchain
        run: |
          set -euo pipefail
          "${{ matrix.triplet }}-clang" --version
          "${{ matrix.triplet }}-strip" --version

      - name: Clone vkd3d-proton
        env:
          VKD3D_REF: ${{ needs.prepare.outputs.vkd3d_ref }}
        run: |
          set -euo pipefail
          git clone \
            --branch "$VKD3D_REF" \
            --depth 1 \
            --filter=blob:none \
            --recurse-submodules \
            --shallow-submodules \
            https://github.com/HansKristian-Work/vkd3d-proton.git \
            "$RUNNER_TEMP/src"

      - name: Refresh Vulkan headers
        env:
          VULKAN_HEADERS_REF: ${{ needs.prepare.outputs.vulkan_headers_ref }}
        run: |
          set -euo pipefail
          if ! git clone --depth 1 --branch "$VULKAN_HEADERS_REF" https://github.com/KhronosGroup/Vulkan-Headers.git "$RUNNER_TEMP/vk-headers"; then
            git clone --depth 1 https://github.com/KhronosGroup/Vulkan-Headers.git "$RUNNER_TEMP/vk-headers"
          fi
          mkdir -p "$RUNNER_TEMP/src/include/vulkan"
          rsync -a --delete "$RUNNER_TEMP/vk-headers/include/vulkan/" "$RUNNER_TEMP/src/include/vulkan/"

      - name: Apply patch profile
        if: ${{ inputs.PATCH_PROFILE != 'none' }}
        env:
          PATCH_PROFILE: ${{ inputs.PATCH_PROFILE }}
        run: |
          set -euo pipefail
          python3 "$GITHUB_WORKSPACE/scripts/patch-vkd3d-proton-arm64ec.py" \
            --root "$RUNNER_TEMP/src" \
            --profile "$PATCH_PROFILE"

      - name: Configure build
        working-directory: ${{ runner.temp }}/src
        env:
          BUILD_TYPE: ${{ inputs.BUILD_TYPE }}
        run: |
          set -euo pipefail

          case "$BUILD_TYPE" in
            release)
              meson_buildtype="release"
              cflags="-O3 -DNDEBUG -ffunction-sections -fdata-sections -fno-math-errno -fno-trapping-math"
              ldflags="-Wl,--gc-sections"
              lto_args=(-Db_lto=true -Db_lto_mode=thin -Db_ndebug=true)
              ;;
            debug)
              meson_buildtype="debug"
              cflags="-O0 -g3"
              ldflags=""
              lto_args=(-Db_lto=false -Db_ndebug=false)
              ;;
            *)
              echo "Unsupported BUILD_TYPE: $BUILD_TYPE" >&2
              exit 1
              ;;
          esac

          cross_file="$RUNNER_TEMP/cross-${{ matrix.arch }}.txt"
          cat > "$cross_file" <<EOF
          [binaries]
          ar = '${{ matrix.triplet }}-ar'
          c = ['ccache', '${{ matrix.triplet }}-clang']
          cpp = ['ccache', '${{ matrix.triplet }}-clang++']
          strip = '${{ matrix.triplet }}-strip'
          windres = '${{ matrix.triplet }}-windres'
          widl = '${{ matrix.triplet }}-widl'

          [host_machine]
          system = 'windows'
          cpu_family = '${{ matrix.cpu_family }}'
          cpu = '${{ matrix.cpu }}'
          endian = 'little'
          EOF

          meson setup "build-${{ matrix.arch }}" \
            --cross-file "$cross_file" \
            --buildtype "$meson_buildtype" \
            "${lto_args[@]}" \
            -Dc_args="$cflags" \
            -Dcpp_args="$cflags" \
            -Dc_link_args="$ldflags" \
            -Dcpp_link_args="$ldflags"

      - name: Build
        working-directory: ${{ runner.temp }}/src
        run: |
          set -euo pipefail
          ninja -C "build-${{ matrix.arch }}" -j"$(nproc)" 2>&1 | tee "build-${{ matrix.arch }}.log"
          ccache --show-stats || true

      - name: Collect binaries
        env:
          BUILD_TYPE: ${{ inputs.BUILD_TYPE }}
          PACKAGE_DIR: ${{ matrix.package_dir }}
          TRIPLET: ${{ matrix.triplet }}
        run: |
          set -euo pipefail
          stage="$RUNNER_TEMP/artifact/${PACKAGE_DIR}"
          mkdir -p "$stage"
          for dll in d3d12.dll d3d12core.dll; do
            dll_path="$(find "$RUNNER_TEMP/src/build-${{ matrix.arch }}" -name "$dll" -type f | head -n 1)"
            if [[ -z "$dll_path" ]]; then
              echo "Missing ${dll} for ${{ matrix.arch }}" >&2
              exit 1
            fi
            cp "$dll_path" "$stage/"
            echo "$dll_path: $(stat -c%s "$dll_path") bytes"
          done
          if [[ "$BUILD_TYPE" == "release" ]]; then
            "${TRIPLET}-strip" --strip-all "$stage"/*.dll || true
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: build-${{ matrix.arch }}
          compression-level: 0
          path: ${{ runner.temp }}/artifact/
          retention-days: 30

  package:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    steps:
      - name: Download ARM64EC artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: build-arm64ec
          path: ${{ runner.temp }}/pkg

      - name: Download x86 artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: build-x86
          path: ${{ runner.temp }}/pkg

      - name: Create package metadata
        working-directory: ${{ runner.temp }}/pkg
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          BUILD_DATE: ${{ needs.prepare.outputs.build_date }}
          SOURCE_COMMIT: ${{ needs.prepare.outputs.source_commit }}
          PACKAGE_NAME: ${{ needs.prepare.outputs.package_name }}
        run: |
          set -euo pipefail
          cat > profile.json <<EOF
          {
            "type": "VKD3D",
            "versionName": "${VERSION}-arm64ec-${SOURCE_COMMIT}",
            "versionCode": ${BUILD_DATE},
            "description": "VKD3D-Proton ARM64EC patched",
            "files": [
              {"source": "system32/d3d12.dll", "target": "\${system32}/d3d12.dll"},
              {"source": "system32/d3d12core.dll", "target": "\${system32}/d3d12core.dll"},
              {"source": "syswow64/d3d12.dll", "target": "\${syswow64}/d3d12.dll"},
              {"source": "syswow64/d3d12core.dll", "target": "\${syswow64}/d3d12core.dll"}
            ]
          }
          EOF

          find . -type f \( -name '*.dll' -o -name 'profile.json' \) -print
          tar --zstd -cf "../${PACKAGE_NAME}.wcp" .
          sha256sum "../${PACKAGE_NAME}.wcp" | tee "../${PACKAGE_NAME}.wcp.sha256"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ needs.prepare.outputs.package_name }}
          compression-level: 0
          path: |
            ${{ runner.temp }}/${{ needs.prepare.outputs.package_name }}.wcp
            ${{ runner.temp }}/${{ needs.prepare.outputs.package_name }}.wcp.sha256
          retention-days: 30

      - name: Publish GitHub release
        if: ${{ inputs.PUBLISH_RELEASE }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SOURCE_COMMIT: ${{ needs.prepare.outputs.source_commit }}
          BUILD_STAMP: ${{ needs.prepare.outputs.build_stamp }}
          VKD3D_REF: ${{ needs.prepare.outputs.vkd3d_ref }}
          LLVM_MINGW_TAG: ${{ needs.prepare.outputs.llvm_mingw_tag }}
          VULKAN_HEADERS_REF: ${{ needs.prepare.outputs.vulkan_headers_ref }}
          PATCH_PROFILE: ${{ inputs.PATCH_PROFILE }}
          BUILD_TYPE: ${{ inputs.BUILD_TYPE }}
          PACKAGE_NAME: ${{ needs.prepare.outputs.package_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          notes_file="$RUNNER_TEMP/release-notes.md"
          cat > "$notes_file" <<EOF
          ## VKD3D-Proton ${VERSION} ARM64EC

          - Source ref: \`${VKD3D_REF}\`
          - Source commit: \`${SOURCE_COMMIT}\`
          - llvm-mingw: \`${LLVM_MINGW_TAG}\`
          - Vulkan-Headers: \`${VULKAN_HEADERS_REF}\`
          - Build type: \`${BUILD_TYPE}\`
          - Patch profile: \`${PATCH_PROFILE}\`
          - Build stamp: \`${BUILD_STAMP}\`

          Source: https://github.com/HansKristian-Work/vkd3d-proton
          EOF

          gh release create "$RELEASE_TAG" \
            --repo "$REPOSITORY" \
            --title "VKD3D-Proton ${VERSION} ARM64EC - ${BUILD_STAMP}" \
            --notes-file "$notes_file" \
            "$RUNNER_TEMP/${PACKAGE_NAME}.wcp" \
            "$RUNNER_TEMP/${PACKAGE_NAME}.wcp.sha256"
