name: Build Turnip

on:
  workflow_dispatch:
    inputs:
      mesa_source:
        type: choice
        description: "Mesa source"
        default: "main_branch"
        options:
          - staging_branch
          - main_branch
          - latest_main
          - robclark_branch
          - autotuner
          - custom_tag

      staging_branch:
        type: choice
        description: "Staging branch"
        default: "staging/26.0"
        options:
          - staging/26.0
          - staging/25.3

      custom_tag:
        description: "Custom Mesa tag"
        required: false
        default: ""

      build_type:
        type: choice
        description: "Meson build type"
        default: "release"
        options:
          - release
          - debug
          - debugoptimized

      build_variant:
        type: choice
        description: "Build variant"
        default: "optimized"
        options:
          - optimized
          - autotuner
          - vanilla
          - debug
          - profile
      target_gpu:
        type: choice
        description: "Target GPU"
        default: "a0xx"
        options:
          - a0xx
          - a7xx
          - a8xx

      ndk_version:
        type: choice
        description: "Android NDK version"
        default: "android-ndk-r29"
        options:
          - android-ndk-r29
          - android-ndk-r28
          - android-ndk-r27

      api_level:
        type: choice
        description: "Android API level"
        default: "35"
        options:
          - "35"
          - "34"
          - "33"

      patch_preset:
        type: choice
        description: "Patch bundle preset"
        default: "performance"
        options:
          - minimal
          - stability
          - performance
          - experimental

      enable_deck_emu:
        type: boolean
        description: "Enable GPU identity spoof"
        default: true

      deck_emu_target:
        type: choice
        description: "GPU vendor to spoof"
        default: "amd"
        options:
          - nvidia
          - amd
      enable_perf:
        type: boolean
        description: "Enable performance flags (-O3 + ARMv8.2-A)"
        default: true

      enable_a7xx_patches:
        type: boolean
        description: "Apply all a7xx patches"
        default: true

      enable_vk14_promo:
        type: boolean
        description: "Force Vulkan 1.4 promotion"
        default: true

      enable_shader_perf:
        type: boolean
        description: "Shader compiler optimizations"
        default: true

      custom_tu_debug:
        description: "Custom TU_DEBUG flags"
        required: true
        default: "noconform,fdm,log_skip_gmem_ops"

      build_number:
        description: "Build number"
        required: true
        default: "1"

      create_release:
        type: boolean
        description: "Create GitHub Release"
        default: false

      release_as_draft:
        type: boolean
        description: "Save release as draft"
        default: true

      enable_a750_autotune:
        type: boolean
        description: "Enable A750 Dynamic Autotune"
        default: true

      a750_gmem_limit_mb:
        type: choice
        description: "GMEM threshold (MB)"
        default: "4"
        options:          
          - "3"
          - "4"
          - "5"
          - "6"

      a750_drawcall_threshold:
        type: choice
        description: "Draw call threshold"
        default: "500"
        options:
          - "200"
          - "500"
          - "1000"
          - "2000"

      frame_control_preset:
        type: choice
        description: "Frame pacing control"
        default: "winlator"
        options:
          - standard
          - winlator
          - aggressive
          - disabled

      log_level:
        type: choice
        description: "Log verbosity"
        default: "info"
        options:
          - quiet
          - info
          - verbose

permissions:
  contents: write
  actions: read

env:
  CACHE_VERSION: "v4"

jobs:
  pre-check:
    runs-on: ubuntu-latest
    outputs:
      validated: ${{ steps.validate.outputs.ok }}
      mesa_ref: ${{ steps.resolve.outputs.ref }}
      patch_flags: ${{ steps.presets.outputs.patch_flags }}
      frame_flags: ${{ steps.presets.outputs.frame_flags }}
    steps:      
      - name: Validate inputs
        id: validate
        run: |
          if [[ "${{ inputs.mesa_source }}" == "custom_tag" && -z "${{ inputs.custom_tag }}" ]]; then
            echo "custom_tag is required when mesa_source=custom_tag"
            exit 1
          fi
          if [[ "${{ inputs.enable_a750_autotune }}" == "true" ]]; then
            if [[ ${{ inputs.a750_gmem_limit_mb }} -lt 3 || ${{ inputs.a750_gmem_limit_mb }} -gt 6 ]]; then
              echo "GMEM limit must be between 3-6 MB"
              exit 1
            fi
          fi
          echo "ok=true" >> $GITHUB_OUTPUT

      - name: Resolve Mesa reference
        id: resolve
        run: |
          case "${{ inputs.mesa_source }}" in
            staging_branch)   ref="${{ inputs.staging_branch }}" ;;
            main_branch|latest_main) ref="main" ;;
            robclark_branch)  ref="robclark/main" ;;
            autotuner)        ref="autotuner" ;;
            custom_tag)       ref="${{ inputs.custom_tag }}" ;;
            *)                ref="main" ;;
          esac
          echo "ref=$ref" >> $GITHUB_OUTPUT

      - name: Expand preset flags
        id: presets
        run: |
          case "${{ inputs.patch_preset }}" in
            minimal)
              echo "patch_flags=ENABLE_TIMELINE_HACK=false ENABLE_UBWC_HACK=false APPLY_PATCH_SERIES=false ENABLE_EXT_SPOOF=false ENABLE_VIEWPORT_CLAMP=false ENABLE_TIMELINE_FIX=false" >> $GITHUB_OUTPUT
              ;;
            stability)
              echo "patch_flags=ENABLE_TIMELINE_HACK=true ENABLE_UBWC_HACK=true APPLY_PATCH_SERIES=true ENABLE_EXT_SPOOF=false ENABLE_VIEWPORT_CLAMP=true ENABLE_TIMELINE_FIX=true" >> $GITHUB_OUTPUT
              ;;
            performance)
              echo "patch_flags=ENABLE_TIMELINE_HACK=true ENABLE_UBWC_HACK=true APPLY_PATCH_SERIES=true ENABLE_EXT_SPOOF=true ENABLE_VIEWPORT_CLAMP=true ENABLE_TIMELINE_FIX=true" >> $GITHUB_OUTPUT
              ;;
            experimental)
              echo "patch_flags=ENABLE_TIMELINE_HACK=true ENABLE_UBWC_HACK=true APPLY_PATCH_SERIES=true ENABLE_EXT_SPOOF=true ENABLE_VIEWPORT_CLAMP=true ENABLE_TIMELINE_FIX=true" >> $GITHUB_OUTPUT
              ;;
          esac

          case "${{ inputs.frame_control_preset }}" in
            standard)
              echo "frame_flags=ENABLE_PRESENT_WAIT_FIX=true ENABLE_FRAME_PACING=true ENABLE_VSYNC_BYPASS=false ENABLE_ANDROID_PROP_CONTROL=true" >> $GITHUB_OUTPUT
              ;;            winlator|aggressive)
              echo "frame_flags=ENABLE_PRESENT_WAIT_FIX=true ENABLE_FRAME_PACING=true ENABLE_VSYNC_BYPASS=true ENABLE_ANDROID_PROP_CONTROL=true" >> $GITHUB_OUTPUT
              ;;
            disabled)
              echo "frame_flags=ENABLE_PRESENT_WAIT_FIX=false ENABLE_FRAME_PACING=false ENABLE_VSYNC_BYPASS=false ENABLE_ANDROID_PROP_CONTROL=false" >> $GITHUB_OUTPUT
              ;;
          esac

  build-turnip:
    needs: pre-check
    if: needs.pre-check.outputs.validated == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      MESA_SOURCE: ${{ inputs.mesa_source }}
      STAGING_BRANCH: ${{ inputs.staging_branch }}
      CUSTOM_TAG: ${{ inputs.custom_tag }}
      MESA_LOCAL_PATH: ""
      BUILD_TYPE: ${{ inputs.build_type }}
      BUILD_VARIANT: ${{ inputs.build_variant }}
      TARGET_GPU: ${{ inputs.target_gpu }}
      NDK_PATH: ${{ github.workspace }}/android-ndk
      NDK_VERSION: ${{ inputs.ndk_version }}
      API_LEVEL: ${{ inputs.api_level }}
      ENABLE_DECK_EMU: ${{ inputs.enable_deck_emu }}
      DECK_EMU_TARGET: ${{ inputs.deck_emu_target }}
      ENABLE_PERF: ${{ inputs.enable_perf }}
      ENABLE_A7XX_COMPAT: ${{ inputs.enable_a7xx_patches }}
      ENABLE_A7XX_PERF: ${{ inputs.enable_a7xx_patches }}
      ENABLE_A7XX_VIS: ${{ inputs.enable_a7xx_patches }}
      ENABLE_VK14_PROMO: ${{ inputs.enable_vk14_promo }}
      ENABLE_SHADER_PERF: ${{ inputs.enable_shader_perf }}
      CUSTOM_TU_DEBUG: ${{ inputs.custom_tu_debug }}
      BUILD_NUMBER: ${{ inputs.build_number }}
      ENABLE_A750_AUTOTUNE: ${{ inputs.enable_a750_autotune }}
      A750_GMEM_LIMIT_MB: ${{ inputs.a750_gmem_limit_mb }}
      A750_DRAWCALL_THRESHOLD: ${{ inputs.a750_drawcall_threshold }}
      LOG_LEVEL: ${{ inputs.log_level }}
      TU_FORCE_IMMEDIATE_PRESENT: ${{ inputs.frame_control_preset != 'disabled' && '1' || '0' }}
      PATCH_PRESET: ${{ inputs.patch_preset }}
      FRAME_CONTROL_PRESET: ${{ inputs.frame_control_preset }}${{ needs.pre-check.outputs.patch_flags }}${{ needs.pre-check.outputs.frame_flags }}
      CFLAGS_EXTRA: >-
        ${{ inputs.enable_perf == true
            && '-O3 -march=armv8.2-a+fp16+rcpc+dotprod -ffast-math -fno-finite-math-only'
            || '-O2' }}
      CXXFLAGS_EXTRA: >-
        ${{ inputs.enable_perf == true            
            && '-O3 -march=armv8.2-a+fp16+rcpc+dotprod -ffast-math -fno-finite-math-only -fno-exceptions'
            || '-O2' }}
      LDFLAGS_EXTRA: >-
        ${{ inputs.enable_perf == true
            && '-Wl,--gc-sections -Wl,--icf=safe'
            || '-Wl,--gc-sections' }}
      BUILD_SCRIPT: "build_turnip.sh"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git curl wget unzip zip \
            python3 python3-pip python3-mako \
            ninja-build ccache patchelf \
            flex bison \
            glslang-tools \
            meson
          if ! meson --version | grep -qE '^1\.[4-9]\.'; then
            pip3 install --break-system-packages --upgrade meson
          fi
          pip3 install --break-system-packages mako pyyaml
          ccache --max-size=2G

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.NDK_PATH }}
          key: ndk-${{ env.NDK_VERSION }}-${{ env.CACHE_VERSION }}
          restore-keys: |
            ndk-${{ env.NDK_VERSION }}-

      - name: Setup Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://dl.google.com/android/repository/${{ env.NDK_VERSION }}-linux.zip" -o ndk.zip
          unzip -q ndk.zip
          mv "${{ env.NDK_VERSION }}" "${{ env.NDK_PATH }}"
          rm ndk.zip

      - name: Cache ccache
        uses: actions/cache@v4
        with:          
          path: ~/.cache/ccache
          key: ccache-${{ inputs.target_gpu }}-${{ inputs.build_variant }}-${{ needs.pre-check.outputs.mesa_ref }}-${{ env.CACHE_VERSION }}
          restore-keys: |
            ccache-${{ inputs.target_gpu }}-${{ inputs.build_variant }}-
            ccache-${{ inputs.target_gpu }}-

      - name: Cache Meson subproject downloads
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/mesa/subprojects/packagecache
          key: meson-wraps-${{ needs.pre-check.outputs.mesa_ref }}-${{ env.CACHE_VERSION }}
          restore-keys: |
            meson-wraps-${{ needs.pre-check.outputs.mesa_ref }}-
            meson-wraps-

      - name: Build Turnip Driver
        id: build
        shell: bash {0}
        run: |
          start_time=$(date +%s)
          bash "${{ env.BUILD_SCRIPT }}"
          build_result=$?
          end_time=$(date +%s)
          duration=$((end_time - start_time))
          echo "Build completed in $((duration/60))m $((duration%60))s"
          if [[ $build_result -ne 0 ]]; then
            echo "Build script exited with error $build_result"
            exit 1
          fi
          if [[ -d "build" ]]; then
            zip_file=$(ls build/Turnip-*.zip 2>/dev/null | head -1)
            if [[ -n "$zip_file" ]]; then
              echo "filename=$(basename "$zip_file")" >> $GITHUB_OUTPUT
              echo "zip_path=$zip_file" >> $GITHUB_OUTPUT
            fi
            echo "version=$(cat build/version.txt 2>/dev/null || echo 'unknown')" >> $GITHUB_OUTPUT
            echo "commit=$(cat build/commit.txt 2>/dev/null | head -c 8)" >> $GITHUB_OUTPUT
            echo "vulkan=$(cat build/vulkan_version.txt 2>/dev/null || echo '1.4.0')" >> $GITHUB_OUTPUT
            echo "build_date=$(cat build/build_date.txt 2>/dev/null || date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          fi
          ccache --show-stats --verbose || true

      - name: Verify build output
        run: |
          if ! ls build/*.zip 1>/dev/null 2>&1; then
            echo "No output zip found"
            ls -la build/ 2>/dev/null || true
            exit 1
          fi
          ls -lh build/*.zip
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.filename || 'turnip-a0xx' }}
          path: build/*.zip
          retention-days: 30
          compression-level: 0

      - name: Create GitHub Release
        if: inputs.create_release == true && steps.build.outputs.filename != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "Turnip-${{ steps.build.outputs.version }}-B${{ inputs.build_number }}"
          name: "Turnip-${{ steps.build.outputs.version }}-B${{ inputs.build_number }}"
          body: |
            ## Turnip Unified Vulkan Driver ${{ steps.build.outputs.version }}

            | Property | Value |
            |----------|-------|
            | Mesa Version | `${{ steps.build.outputs.version }}` |
            | Commit | `${{ steps.build.outputs.commit }}` |
            | Vulkan API | `${{ steps.build.outputs.vulkan }}` |
            | Driver File | `vulkan.ad00xx.so` |
            | GPU Support | a7xx (725/730/735/740/750) + a8xx (810/825/829/830/840) |
            | Build Type | `${{ inputs.build_type }}` |
            | Variant | `${{ inputs.build_variant }}` |
            | Mesa Source | `${{ inputs.mesa_source }}` |
            | NDK | `${{ inputs.ndk_version }}` |
            | API Level | `${{ inputs.api_level }}` |
            | Build Date | `${{ steps.build.outputs.build_date }}` |
            | Patch Preset | `${{ inputs.patch_preset }}` |
            | Frame Control | `${{ inputs.frame_control_preset }}` |

            ### TU_DEBUG (Winlator EnvVars)

            | Winlator UI Name | Function |
            |------------------|----------|
            | `perf` | GPU turbo mode |
            | `push_consts_per_stage` | Double register file |
            | `noconform` | Force UBWC on all images |
            | `bos` | SLC cache pin |
            | `dynamic` | Force variable rate shading |
            | `fdm` | Defrag render passes |
            | `rd` | CP prefetch optimization |
            | `3d_load` | Shuffle instruction hint |
            | `rast_order` | VGT prefetch hint |
            | `log_skip_gmem_ops` | Loop unroll hint |

            > In Winlator: Container Settings → Environment Variables → TU_DEBUG
            ### Features
            ${{ inputs.enable_deck_emu == true && format('- GPU Spoof: {0}', inputs.deck_emu_target) || '' }}
            ${{ inputs.enable_perf == true && '- Performance Flags (-O3 + ARMv8.2-A)' || '' }}
            ${{ inputs.enable_a7xx_patches == true && '- a7xx Patches' || '' }}
            ${{ inputs.enable_vk14_promo == true && '- Vulkan 1.4 Promotion' || '' }}
            ${{ inputs.enable_shader_perf == true && '- Shader Compiler Optimizations' || '' }}
            ${{ inputs.enable_a750_autotune == true && '- A750 Dynamic Autotune' || '' }}
            - Patch Preset: `${{ inputs.patch_preset }}`
            - Frame Control: `${{ inputs.frame_control_preset }}`

            ### Dynamic Control via ADB
            ```bash
            adb shell setprop debug.tu.draw_limit 300
            adb shell setprop debug.tu.bypass 1
            ```

            Compiled from Mesa freedreno
          files: build/*.zip
          draft: ${{ inputs.release_as_draft }}
          prerelease: ${{ inputs.build_variant == 'debug' || inputs.build_variant == 'profile' }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        if: always()
        run: |
          echo "Status: ${{ job.status }}"
          echo "Mesa Source: ${{ inputs.mesa_source }}"
          echo "Mesa Ref: ${{ needs.pre-check.outputs.mesa_ref }}"
          echo "Build Variant: ${{ inputs.build_variant }}"
          echo "NDK: ${{ inputs.ndk_version }} (API ${{ inputs.api_level }})"
          echo "Patch Preset: ${{ inputs.patch_preset }}"
          echo "Frame Control: ${{ inputs.frame_control_preset }}"
          echo "Driver: vulkan.ad00xx.so"
          if [[ -f "build/version.txt" ]]; then
            echo "Version: $(cat build/version.txt)"
            echo "Commit: $(cat build/commit.txt)"
            echo "Vulkan API: $(cat build/vulkan_version.txt 2>/dev/null || echo N/A)"
          fi
          echo "Artifacts: $(ls build/*.zip 2>/dev/null | wc -l) file(s)"

  notify-on-failure:
    needs: build-turnip
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify build failure
        run: |         
          echo "Build failed for Turnip Driver"
          echo "Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
