name: Build Vulkan Wrapper (bionic-vulkan-wrapper)

on:
  workflow_dispatch:
    inputs:
      ndk_version:
        description: 'NDK version (e.g. r27c, r28b)'
        required: false
        default: 'r27c'
      api_level:
        description: 'Android API level'
        required: false
        default: '28'
      build_type:
        description: 'Build type'
        required: false
        default: 'release'
        type: choice
        options: [release, debug, debugoptimized]

env:
  NDK_VERSION: 'android-ndk-r27c'
  NDK_URL: 'https://dl.google.com/android/repository/android-ndk-r27c-linux.zip'
  API_LEVEL: '28'
  WRAPPER_REPO: 'https://github.com/BlueInstruction/bionic-vulkan-wrapper.git'
  WRAPPER_BRANCH: 'wrapper'

jobs:
  build:
    name: Build libvulkan_wrapper.so (arm64-v8a)
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3 python3-pip python3-setuptools python3-wheel \
            python3-mako python3-ply python3-yaml python3-jinja2 \
            meson ninja-build cmake pkg-config \
            zstd patchelf zip unzip \
            bison flex gettext \
            libwayland-dev wayland-protocols \
            glslang-tools spirv-tools \
            ccache ca-certificates curl git

          # Ensure meson is recent enough (>= 1.0)
          pip3 install --user "meson>=1.0" || true
          echo "$HOME/.local/bin" >> $GITHUB_PATH

          echo "meson: $(meson --version)"
          echo "ninja: $(ninja --version)"
          echo "python3: $(python3 --version)"

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: /opt/android-ndk
          key: ndk-${{ env.NDK_VERSION }}-v1

      - name: Download NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          echo "Downloading ${{ env.NDK_VERSION }}..."
          curl -fsSL "${{ env.NDK_URL }}" -o ndk.zip
          unzip -q ndk.zip
          sudo mv ${{ env.NDK_VERSION }} /opt/android-ndk
          rm -f ndk.zip
          echo "NDK ready: $(du -sh /opt/android-ndk | cut -f1)"

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-wrapper-${{ github.run_id }}
          restore-keys: |
            ccache-wrapper-

      - name: Configure ccache
        run: |
          ccache --max-size=2G
          ccache --zero-stats
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: Clone bionic-vulkan-wrapper
        run: |
          git clone --depth=200 --branch "${{ env.WRAPPER_BRANCH }}" \
            "${{ env.WRAPPER_REPO }}" wrapper-src
          cd wrapper-src
          echo "Wrapper source: $(git log --oneline -1)"
          echo "WRAPPER_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Create cross-compilation file
        run: |
          NDK="/opt/android-ndk"
          NDK_BIN="${NDK}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          NDK_SYS="${NDK}/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          API="${{ inputs.api_level || env.API_LEVEL }}"

          # Find the right clang version
          CVER="$API"
          [[ ! -f "${NDK_BIN}/aarch64-linux-android${CVER}-clang" ]] && CVER="28"
          [[ ! -f "${NDK_BIN}/aarch64-linux-android${CVER}-clang" ]] && CVER="26"

          cat > cross-aarch64-android.txt << 'CROSSEOF'
[binaries]
ar     = 'NDK_BIN_PLACEHOLDER/llvm-ar'
c      = ['ccache', 'NDK_BIN_PLACEHOLDER/aarch64-linux-androidCVER_PLACEHOLDER-clang', '--sysroot=NDK_SYS_PLACEHOLDER']
cpp    = ['ccache', 'NDK_BIN_PLACEHOLDER/aarch64-linux-androidCVER_PLACEHOLDER-clang++', '--sysroot=NDK_SYS_PLACEHOLDER']
c_ld   = 'lld'
cpp_ld = 'lld'
strip  = 'NDK_BIN_PLACEHOLDER/llvm-strip'
pkgconfig = '/usr/bin/pkg-config'

[host_machine]
system     = 'android'
cpu_family = 'aarch64'
cpu        = 'armv8'
endian     = 'little'

[built-in options]
c_args        = ['-D__ANDROID__', '-Wno-error', '-Wno-deprecated-declarations', '-O2', '-DNDEBUG']
cpp_args      = ['-D__ANDROID__', '-Wno-error', '-Wno-deprecated-declarations', '-O2', '-DNDEBUG']
c_link_args   = ['-static-libstdc++', '-Wl,--gc-sections']
cpp_link_args = ['-static-libstdc++', '-Wl,--gc-sections']
CROSSEOF

          # Replace placeholders with actual paths
          sed -i "s|NDK_BIN_PLACEHOLDER|${NDK_BIN}|g" cross-aarch64-android.txt
          sed -i "s|NDK_SYS_PLACEHOLDER|${NDK_SYS}|g" cross-aarch64-android.txt
          sed -i "s|CVER_PLACEHOLDER|${CVER}|g" cross-aarch64-android.txt

          echo "Cross file created"
          cat cross-aarch64-android.txt

      - name: Setup SPIRV subprojects
        run: |
          cd "$WRAPPER_DIR"
          mkdir -p subprojects
          for proj in spirv-tools spirv-headers; do
            if [ ! -d "subprojects/$proj" ]; then
              echo "Cloning $proj..."
              git clone --depth=1 "https://github.com/KhronosGroup/${proj}.git" "subprojects/$proj"
            fi
          done
          echo "Subprojects ready"

      - name: Inspect meson build options
        run: |
          cd "$WRAPPER_DIR"
          echo "=== meson_options.txt ==="
          cat meson_options.txt 2>/dev/null | head -100 || echo "(not found)"
          echo ""
          echo "=== Searching for wrapper build target ==="
          grep -r "vulkan_wrapper\|libvulkan_wrapper" meson.build src/*/meson.build 2>/dev/null | head -30 || true
          echo ""
          echo "=== Checking vulkan-drivers options ==="
          grep -r "vulkan.drivers\|vulkan-drivers\|wrapper" meson_options.txt meson.build 2>/dev/null | head -20 || true

      - name: Configure Meson build
        run: |
          cd "$WRAPPER_DIR"
          TYPE="${{ inputs.build_type || 'release' }}"

          # The leegao wrapper fork builds libvulkan_wrapper.so as a custom
          # target in the Mesa build tree. We need to enable the right drivers
          # and let the fork's meson.build handle the rest.
          meson setup build \
            --cross-file "${{ github.workspace }}/cross-aarch64-android.txt" \
            -Dbuildtype="$TYPE" \
            -Dplatforms=android \
            -Dplatform-sdk-version="${{ inputs.api_level || env.API_LEVEL }}" \
            -Dandroid-stub=true \
            -Dgallium-drivers= \
            -Dvulkan-drivers=freedreno \
            -Dfreedreno-kmds=kgsl \
            -Degl=disabled \
            -Dglx=disabled \
            -Dgles1=disabled \
            -Dgles2=disabled \
            -Dopengl=false \
            -Dgbm=disabled \
            -Dllvm=disabled \
            -Dlibunwind=disabled \
            -Dlmsensors=disabled \
            -Dzstd=disabled \
            -Dvalgrind=disabled \
            -Dbuild-tests=false \
            -Dwerror=false \
            -Ddefault_library=shared \
            --force-fallback-for=spirv-tools,spirv-headers \
            2>&1 | tee meson-configure.log

          echo ""
          echo "Meson configuration complete"

      - name: Build wrapper
        run: |
          cd "$WRAPPER_DIR"
          ninja -C build -j$(nproc) 2>&1 | tee build.log

          echo ""
          echo "Build artifacts (.so files):"
          find build -name "*.so" -type f | sort
          echo ""
          echo "Build artifacts (wrapper-related):"
          find build -name "*wrapper*" -o -name "*vulkan*freedreno*" | sort
          find build -name "*.so" -exec ls -lh {} \; | sort -k5 -h

      - name: Package wrapper.tzst
        run: |
          cd "$WRAPPER_DIR"

          # The fork may produce libvulkan_wrapper.so or libvulkan_freedreno.so
          SO=$(find build -name "libvulkan_wrapper.so" -type f | head -1)
          if [ -z "$SO" ]; then
            SO=$(find build -name "libvulkan_freedreno.so" -type f | head -1)
          fi
          if [ -z "$SO" ]; then
            echo "ERROR: No vulkan .so found. All .so files:"
            find build -name "*.so" -type f -exec ls -lh {} \;
            exit 1
          fi

          echo "Found: $SO ($(du -h "$SO" | cut -f1))"

          # Strip the binary
          /opt/android-ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip "$SO" 2>/dev/null || true
          echo "Stripped: $(du -h "$SO" | cut -f1)"

          # Create wrapper.tzst (matches Winlator-Ludashi layout)
          STAGE=$(mktemp -d)
          mkdir -p "${STAGE}/usr/lib"
          cp "$SO" "${STAGE}/usr/lib/libvulkan_wrapper.so"

          # Copy any .spv shaders
          find build -name "*.spv" -exec cp {} "${STAGE}/usr/lib/" \;

          DIST="${{ github.workspace }}/dist"
          mkdir -p "$DIST"

          (cd "$STAGE" && \
           tar --use-compress-program="zstd -19 -T0" \
               -cf "${DIST}/wrapper.tzst" \
               usr/)

          echo "wrapper.tzst: $(du -h "${DIST}/wrapper.tzst" | cut -f1)"

          # Create extra_libs.tzst (shaders + any extra libs)
          STAGE2=$(mktemp -d)
          mkdir -p "${STAGE2}/usr/lib"
          find build -name "*.spv" -exec cp {} "${STAGE2}/usr/lib/" \;
          cp "$SO" "${STAGE2}/usr/lib/libvulkan_wrapper.so"

          (cd "$STAGE2" && \
           tar --use-compress-program="zstd -19 -T0" \
               -cf "${DIST}/extra_libs.tzst" \
               usr/) 2>/dev/null || true

          # SHA256 checksums
          cd "$DIST"
          sha256sum *.tzst *.so 2>/dev/null > SHA256SUMS.txt || \
          sha256sum *.tzst > SHA256SUMS.txt || true

          echo ""
          echo "=== Package contents ==="
          ls -lh "$DIST"/
          echo ""
          cat SHA256SUMS.txt

          # Copy raw .so for separate artifact
          cp "$SO" "${DIST}/libvulkan_wrapper.so"

      - name: Print ccache stats
        if: always()
        run: ccache --show-stats

      - name: Upload wrapper.tzst
        uses: actions/upload-artifact@v4
        with:
          name: wrapper-tzst
          path: |
            dist/wrapper.tzst
            dist/extra_libs.tzst
            dist/SHA256SUMS.txt
          retention-days: 90

      - name: Upload raw libvulkan_wrapper.so
        uses: actions/upload-artifact@v4
        with:
          name: libvulkan_wrapper-arm64
          path: dist/libvulkan_wrapper.so
          retention-days: 90

      - name: Build summary
        run: |
          SO_SIZE=$(du -h dist/libvulkan_wrapper.so | cut -f1)
          TZST_SIZE=$(du -h dist/wrapper.tzst | cut -f1)
          cd "$WRAPPER_DIR"
          COMMIT=$(git rev-parse --short=8 HEAD)

          echo ""
          echo "  ╔═══════════════════════════════════════════════════════════╗"
          echo "  ║         Vulkan Wrapper Build Summary                      ║"
          echo "  ╠═══════════════════════════════════════════════════════════╣"
          printf "  ║  %-20s : %-35s ║\n" "libvulkan_wrapper" "$SO_SIZE"
          printf "  ║  %-20s : %-35s ║\n" "wrapper.tzst"      "$TZST_SIZE"
          printf "  ║  %-20s : %-35s ║\n" "Commit"            "$COMMIT"
          printf "  ║  %-20s : %-35s ║\n" "NDK"               "${{ env.NDK_VERSION }}"
          printf "  ║  %-20s : %-35s ║\n" "API Level"         "${{ inputs.api_level || env.API_LEVEL }}"
          printf "  ║  %-20s : %-35s ║\n" "Build Type"        "${{ inputs.build_type || 'release' }}"
          echo "  ╠═══════════════════════════════════════════════════════════╣"
          echo "  ║  Drop wrapper.tzst into:                                 ║"
          echo "  ║    assets/graphics_driver/wrapper.tzst                   ║"
          echo "  ║  Or copy libvulkan_wrapper.so to:                        ║"
          echo "  ║    Z:\\usr\\lib\\libvulkan_wrapper.so                       ║"
          echo "  ╚═══════════════════════════════════════════════════════════╝"
