name: Build Turnip

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build patchelf unzip flex bison git perl python3-pip glslang-tools
          pip3 install --upgrade meson mako

      - name: Build Driver
        run: |
          chmod +x turnip_builder.sh
          ./turnip_builder.sh

      - name: Read Release Metadata
        run: |
          echo "TAG_NAME=$(cat turnip_workdir/tag)" >> $GITHUB_ENV
          echo "RELEASE_NAME=$(cat turnip_workdir/release)" >> $GITHUB_ENV
          echo "ZIP_PATH=$(ls turnip_workdir/Turnip-*.zip | head -n 1)" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: driver-turnip-backup
          path: ${{ env.ZIP_PATH }}

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          body_path: turnip_workdir/description
          files: ${{ env.ZIP_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
